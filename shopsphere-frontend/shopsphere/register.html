<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ShopSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header" class="site-header"></header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h2>Create your account</h2>
      <p class="sub">Join ShopSphere in under a minute</p>

      <form id="register-form" novalidate>
        <div class="form-field">
          <label for="reg-name">Full name</label>
          <input type="text" id="reg-name" required>
          <div class="error-msg"></div>
        </div>
        <div class="form-field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required>
          <div class="error-msg"></div>
        </div>
        <div class="form-field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required minlength="6">
          <div class="error-msg"></div>
        </div>
        <button type="submit" class="btn btn-accent btn-block">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("reg-name").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      let valid = true;

      const nameErr = document.getElementById("reg-name").closest(".form-field").querySelector(".error-msg");
      const emailErr = document.getElementById("reg-email").closest(".form-field").querySelector(".error-msg");
      const passErr = document.getElementById("reg-password").closest(".form-field").querySelector(".error-msg");
      [nameErr, emailErr, passErr].forEach(e => e.textContent = "");

      if (name.length < 2) { nameErr.textContent = "Enter your full name."; valid = false; }
      if (!/^\S+@\S+\.\S+$/.test(email)) { emailErr.textContent = "Enter a valid email."; valid = false; }
      if (password.length < 6) { passErr.textContent = "Password must be at least 6 characters."; valid = false; }

      if (!valid) return;

      const result = Auth.register(name, email, password);
      if (result.ok) {
        UI.toast("Account created!", "success");
        setTimeout(() => window.location.href = "account.html", 600);
      } else {
        emailErr.textContent = result.error;
        UI.toast(result.error, "error");
      }
    });
  </script>
</body>
</html>
