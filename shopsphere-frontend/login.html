<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ShopSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header" class="site-header"></header>

  <main class="auth-wrapper">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to continue to your account</p>

      <form id="login-form" novalidate>
        <div class="form-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
          <div class="error-msg"></div>
        </div>
        <div class="form-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
          <div class="error-msg"></div>
        </div>
        <button type="submit" class="btn btn-accent btn-block">Sign in</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      const result = Auth.login(email, password);
      if (result.ok) {
        UI.toast("Welcome back!", "success");
        setTimeout(() => window.location.href = "account.html", 600);
      } else {
        document.querySelector("#login-password").closest(".form-field").querySelector(".error-msg").textContent = result.error;
        UI.toast(result.error, "error");
      }
    });
  </script>
</body>
</html>
